server:
  port: 8080

spring:
  application:
    name: moida
  config:
    import: optional:file:.env
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ## Redis - 조회수/좋아요 카운트/인기 태그/게시글 목록 캐싱용
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ## Spring Cache 설정
  cache:
    type: redis

## p6spy
decorator:
  datasource:
    p6spy:
      enable-logging: on

## logging
logging:
  charset:
    console: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} ${LOG_LEVEL_PATTERN:%-5p} ${PID} --- [%15.15t] %-40.40logger{39} :%06L : %m%n"
  level:
    root: info
    web: info
    com.malgn: debug

## jwt
jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000  # 30일 (ms)

## Google Maps API
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

## 이미지 업로드 설정
app:
  image:
    upload-dir: ${IMAGE_UPLOAD_DIR:./uploads/images}
    url-prefix: ${IMAGE_URL_PREFIX:http://localhost:8080/images}

